syntax = "proto2";

enum ClosedEnum {
  CLOSED_ENUM_UNSPECIFIED = 0;
  CLOSED_ENUM_ONE = 1;
}

message TestMessage {
  optional int32 field1 = 1;
  optional int32 explicit_field = 2;
  required int32 legacy_required = 3;

  repeated int32 packed = 50 [packed = true];
  repeated int32 expanded = 51;

  optional group Delimited = 100 {
    optional int32 field11 = 11;
  };
  optional TestMessage length_prefixed = 101;
  map<int32, int32> int32_keyed_map = 102;
  map<string, int32> string_keyed_map = 103;

  optional ClosedEnum implicit_enum = 4;
  optional ClosedEnum explicit_enum = 5;
  repeated ClosedEnum repeated_enum = 52 [packed = true];

  oneof enum_choice {
    ClosedEnum oneof_enum = 53;
  }

  extensions 200 to 299;
}

extend TestMessage {
  optional ClosedEnum closed_enum_extension = 200;
}
