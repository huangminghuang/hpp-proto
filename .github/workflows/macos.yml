---
name: MacOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - dev/**
    paths-ignore:
        - '**.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
        - '**.md'

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules
  CCACHE_DIR: ${{ github.workspace }}/.ccache

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - cmake_preset: ci-macos-release
          - cmake_preset: ci-macos-coverage

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-${{ runner.os }}-${{ matrix.cmake_preset }}-cpm-modules-${{ hashFiles('**/third-parties.cmake') }}

      - name: Cache ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.workflow }}-${{ runner.os }}-${{ matrix.cmake_preset }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ github.workflow }}-${{ runner.os }}-${{ matrix.cmake_preset }}-ccache-

      - name: Setup required C++ tools
        uses: aminya/setup-cpp@8170d66c458f4a045220b7b0966c10940bb2a15d # v1.8.1
        with:
          cmake: "4.4.0"
          ninja: true
          ccache: true

      - name: Install grpc
        shell: bash
        run: brew install grpc
        
      - name: install lcov
        if: matrix.cmake_preset == 'ci-macos-coverage'
        run: brew install lcov

      - name: configure
        shell: bash
        run: |
          protobuf_formula="$(
            brew info --json=v2 grpc | /usr/bin/ruby -rjson -e '
              data = JSON.parse(STDIN.read)
              formula = data.fetch("formulae").first || {}
              installed = formula.fetch("installed", [])
              runtime = installed.flat_map { |i| i.fetch("runtime_dependencies", []) }
              dep = runtime.map { |d| d["full_name"] }.find { |n| n&.match?(/^protobuf(@\d+)?$/) }
              dep ||= formula.fetch("dependencies", []).find { |n| n.match?(/^protobuf(@\d+)?$/) }
              puts(dep) if dep
            '
          )"
          if [[ -z "${protobuf_formula}" ]]; then
            echo "Failed to resolve protobuf dependency for grpc" >&2
            exit 1
          fi
          protobuf_prefix="$(brew --prefix "${protobuf_formula}")"
          export PATH="${protobuf_prefix}/bin:${PATH}"
          cmake --preset "${{ matrix.cmake_preset }}"

      - name: build
        run: cmake --build build

      - name: test
        working-directory: ./build
        run: |
          ctest --output-on-failure


      - name: capture coverage
        if: matrix.cmake_preset == 'ci-macos-coverage'
        run: |
          cmake --build build --target coverage_filtered_info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        if: matrix.cmake_preset == 'ci-macos-coverage'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/coverage.filtered.info
          flags: macos
          name: macos-coverage
          verbose: true
