name: Conan Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - dev/**
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - "**.md"

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  PROTOC_VERSION: "35.0"
  PROTOC_ZIP: protoc-35.0-win64.zip
  PROTOC_SHA256: d1cede9e308cc3eb072392af1c02ccae4bdd3d2f374ec2970dbd8cdfdaa91363
  CCACHE_DIR: ${{ github.workspace }}/.ccache

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: conan-protobuf-binary-shared
            lockfile: conan/locks/windows-protobuf.lock
            package_list: conan/packages/windows-protobuf.json
            with_protobuf: "True"
            cmake_configure_preset: conan-release
            cmake_build_preset: conan-release
            build_shared_libs: "ON"
          - name: system-protobuf-cpp23-static
            lockfile: conan/locks/windows-system.lock
            package_list: conan/packages/windows-system.json
            with_protobuf: "False"
            cmake_configure_preset: conan-release
            cmake_build_preset: conan-release
            build_shared_libs: "OFF"
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: setup cpp tools
        uses: aminya/setup-cpp@8170d66c458f4a045220b7b0966c10940bb2a15d # v1.8.1
        with:
          cmake: "4.4.0"
          ninja: true
          ccache: true
          conan: "2.30.0"

      - name: Cache ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.workflow }}-${{ runner.os }}-${{ matrix.name }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ github.workflow }}-${{ runner.os }}-${{ matrix.name }}-ccache-

      - name: install protoc
        run: |
          $zip = "$env:TEMP\\$env:PROTOC_ZIP"
          Invoke-WebRequest -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v$env:PROTOC_VERSION/$env:PROTOC_ZIP" -OutFile $zip
          $actual = (Get-FileHash -Path $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $expected = "$env:PROTOC_SHA256".ToLowerInvariant()
          if ($actual -ne $expected) {
            throw "Checksum mismatch for $env:PROTOC_ZIP. Expected $expected, got $actual"
          }
          Expand-Archive -Path $zip -DestinationPath "$env:TEMP\\protoc"
          Add-Content $env:GITHUB_PATH "$env:TEMP\\protoc\\bin"

      - name: download locked dependency binaries
        run: |
          conan download `
            --list="${{ matrix.package_list }}" `
            --remote=conancenter

      - name: create package
        run: |
          conan create . `
            -pr:h conan/profiles/windows-host `
            -pr:b conan/profiles/windows-build `
            -o "&:with_protobuf=${{ matrix.with_protobuf }}" `
            --lockfile="${{ matrix.lockfile }}" `
            --no-remote

      - name: install dependencies
        run: |
          conan install tutorial `
            -pr:h conan/profiles/windows-host `
            -pr:b conan/profiles/windows-build `
            -o "hpp_proto/*:with_protobuf=${{ matrix.with_protobuf }}" `
            --lockfile="${{ matrix.lockfile }}" `
            --lockfile-partial `
            --no-remote `
            -of tutorial-build

      - name: configure
        run: cmake -S tutorial --preset "${{ matrix.cmake_configure_preset }}" -DBUILD_SHARED_LIBS=${{ matrix.build_shared_libs }}

      - name: build
        run: |
          cd tutorial
          cmake --build --preset "${{ matrix.cmake_build_preset }}" -j2

      - name: test
        run: |
          cd tutorial
          ctest --preset "${{ matrix.cmake_build_preset }}" --output-on-failure
