name: Fetch_Content_Usage

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - dev/**
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules
  CCACHE_DIR: ${{ github.workspace }}/.ccache

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        gcc: [13]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup required C++ tools
        uses: aminya/setup-cpp@8170d66c458f4a045220b7b0966c10940bb2a15d # v1.8.1
        with:
          compiler: gcc-${{ matrix.gcc }}
          cmake: "4.4.0"
          ninja: true
          ccache: true

      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/third-parties.cmake') }}

      - name: Cache ccache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ github.workflow }}-${{ runner.os }}-gcc-${{ matrix.gcc }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ github.workflow }}-${{ runner.os }}-gcc-${{ matrix.gcc }}-ccache-

      - name: install protoc
        run: |
          sudo apt-get update
          sudo apt install -y git protobuf-compiler libprotobuf-dev

      - name: Resolve FetchContent source
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REPO_FULL_NAME="${{ github.event.pull_request.head.repo.full_name }}"
            SOURCE_SHA="${{ github.event.pull_request.head.sha }}"
          else
            REPO_FULL_NAME="${{ github.repository }}"
            SOURCE_SHA="${{ github.sha }}"
          fi
          {
            echo "HPP_PROTO_GIT_REPOSITORY=https://github.com/${REPO_FULL_NAME}.git"
            echo "HPP_PROTO_GIT_TAG=${SOURCE_SHA}"
            echo "CPM_hpp_proto_SOURCE=${{ github.workspace }}"
          } >> "$GITHUB_ENV"
  
      - name: configure
        run: >
          cmake
          -DHPP_PROTO_GIT_REPOSITORY="${HPP_PROTO_GIT_REPOSITORY}"
          -DHPP_PROTO_GIT_TAG="${HPP_PROTO_GIT_TAG}"
          -DCPM_hpp_proto_SOURCE="${CPM_hpp_proto_SOURCE}"
          -S tutorial
          -B tutorial-build

      - name: build
        run: cmake --build tutorial-build --config Release -j4

      - name: test
        run: |
          cd tutorial-build
          ctest --build-config Release --output-on-failure
