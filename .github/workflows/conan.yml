---
name: Conan

on:
  push:
    branches:
      - main
      - develop
      - dev/**
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'

env:
  CTEST_OUTPUT_ON_FAILURE: 1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: install conan
        run: |
          python -m pip install --upgrade pip
          python -m pip install conan

      - name: conan profile
        run: conan profile detect --force

      - name: create package
        run: |
          conan create . \
            -s:h compiler.cppstd=23 -s:b compiler.cppstd=23 \
            --build=missing

      - name: install dependencies
        run: |
          conan install tutorial \
            -s:h compiler.cppstd=23 -s:b compiler.cppstd=23 \
            --build=missing \
            -of tutorial-build

      - name: configure
        run: |
          cmake -S tutorial -B tutorial-build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=tutorial-build/conan_toolchain.cmake

      - name: build
        run: cmake --build tutorial-build --config Release -j4

      - name: test
        run: |
          cd tutorial-build
          ctest --build-config Release --output-on-failure
