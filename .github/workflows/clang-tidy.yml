name: Clang-Tidy 21

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - dev/**
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'

env:
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CTCACHE_DIR: ${{ github.workspace }}/.ctcache
  CTCACHE_LOCAL: "1"

jobs:
  clang-tidy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare cache directories
        run: |
          mkdir -p "${CPM_SOURCE_CACHE}"
          mkdir -p "${CCACHE_DIR}"
          mkdir -p "${CTCACHE_DIR}"

      - uses: actions/cache@v5
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: clang-tidy-${{ runner.os }}-${{ hashFiles('**/third-parties.cmake') }}

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: clang-tidy-${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            clang-tidy-${{ runner.os }}-ccache-

      - name: Cache ctcache
        uses: actions/cache@v5
        with:
          path: ${{ env.CTCACHE_DIR }}
          key: clang-tidy-${{ runner.os }}-ctcache-${{ hashFiles('.clang-tidy', '.github/workflows/clang-tidy.yml') }}-${{ github.sha }}
          restore-keys: |
            clang-tidy-${{ runner.os }}-ctcache-${{ hashFiles('.clang-tidy', '.github/workflows/clang-tidy.yml') }}-
            clang-tidy-${{ runner.os }}-ctcache-

      - name: Setup required C++ tools
        uses: aminya/setup-cpp@v1.8.0
        with:
          compiler: llvm-22
          cmake: "3.31.0"
          ninja: true
          ccache: true
          clang-tidy: true

      - name: Install and wire ctcache
        shell: bash
        run: |
          python3 -m pip install --user --break-system-packages --upgrade \
            "git+https://github.com/matus-chochlik/ctcache.git"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          REAL_CLANG_TIDY="$(command -v clang-tidy)"
          WRAPPER_DIR="${RUNNER_TEMP}/ctcache-bin"
          mkdir -p "${WRAPPER_DIR}"
          cat > "${WRAPPER_DIR}/clang-tidy" <<'EOF'
          #!/usr/bin/env bash
          exec clang-tidy-cache "${REAL_CLANG_TIDY}" "$@"
          EOF
          sed -i "s#\${REAL_CLANG_TIDY}#${REAL_CLANG_TIDY}#g" "${WRAPPER_DIR}/clang-tidy"
          chmod +x "${WRAPPER_DIR}/clang-tidy"
          echo "${WRAPPER_DIR}" >> "$GITHUB_PATH"

      - name: Show ctcache toolchain
        run: |
          command -v clang-tidy
          command -v clang-tidy-cache
          clang-tidy --version

      - name: Install protobuf dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev libgrpc++-dev protobuf-compiler-grpc

      - name: Configure (clang-tidy via ctcache)
        run: |
          cmake -GNinja -S . -B build -DCMAKE_BUILD_TYPE=Release \
                -DHPP_PROTO_PROTOC=find \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DCMAKE_C_COMPILER_LAUNCHER=ccache \
                -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
                -DCMAKE_C_CLANG_TIDY="clang-tidy;-warnings-as-errors=*" \
                -DCMAKE_CXX_CLANG_TIDY="clang-tidy;-warnings-as-errors=*"

      - name: Build (clang-tidy via ctcache)
        run: cmake --build build -j"$(nproc)"

      - name: ctcache stats
        if: always()
        run: |
          clang-tidy-cache --show-stats || true
